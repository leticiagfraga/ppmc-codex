```toml
# Configuração inicial do Codex para o repositório PPMC
# Mantido o modelo atual do ambiente para reduzir risco de incompatibilidade.

personality = "pragmatic"
model = "gpt-5.3-codex"
review_model = "gpt-5.3-codex"
model_reasoning_effort = "high"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"
project_root_markers = [".git", ".codex", "AGENTS.md"]

[windows]
sandbox = "elevated"

[features]
multi_agent = false